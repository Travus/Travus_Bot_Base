name: Lint

on:
  push:
    branches: [ master ]
    paths: [ '**.py' ]
  pull_request:
    branches: [ master ]
    paths: [ '**.py' ]

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python 3.10
        uses: actions/checkout@v2
      - uses: actions/setup-python@v1
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black ruff pylint pyright
          pip install -r requirements.txt
      - name: Check Black style
        run: black ./*.py modules/*.py
      - name: Lint with Ruff
        run: ruff ./*.py modules/*.py
      - name: Lint with pylint
        run: pylint ./*.py modules/*.py
      - name: Lint with pyright
        run: pyright --createstub discord; pyright --createstub asyncpg; pyright ./*.py modules/*.py